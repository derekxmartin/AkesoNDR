title: EDR + NDR - Credential Theft Followed by Lateral Movement
id: a1b2c3d4-1111-4000-8000-000000000001
status: experimental
description: |
  EDR detects LSASS access (credential dumping) on Host A, then NDR detects
  SMB lateral movement from Host A to Host B within 30 minutes. This confirms
  a credential theft → lateral movement attack chain.
references:
  - https://attack.mitre.org/techniques/T1003/
  - https://attack.mitre.org/techniques/T1021/002/
author: AkesoNDR
date: 2026/03/25
tags:
  - attack.credential_access
  - attack.lateral_movement
  - attack.t1003
  - attack.t1021.002
logsource:
  product: akeso_ndr
  category: correlation
detection:
  credential_theft:
    source_type: akeso_edr
    event.action: process_access
    process.target.name|endswith: lsass.exe
    process.target.access_mask:
      - '0x1010'
      - '0x1410'
      - '0x1438'
  lateral_movement:
    source_type: akeso_ndr
    event.dataset: 'ndr:detection'
    ndr.detection.name|contains: lateral_movement
    source.ip: '%credential_theft.host.ip%'
  timeframe: 30m
  condition: credential_theft | lateral_movement
level: critical
falsepositives:
  - Legitimate admin tools accessing LSASS followed by admin SMB activity
